<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENU PRINCIPAL - Quiz Francês</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        h1 { color: #333; text-align: center; }
        .quiz-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .quiz-card { background: #007bff; color: white; padding: 30px; border-radius: 10px; text-align: center; text-decoration: none; display: block; }
        .quiz-card:hover { background: #0056b3; transform: translateY(-2px); }
        .quiz-icon { font-size: 2rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Quiz de Francês do Charlie</h1>
        <p style="text-align: center; color: #666;">Escolha um tema para praticar</p>
        
        <div class="quiz-grid">
            <a href="passe-compose-quiz.html" class="quiz-card">
                <div class="quiz-icon">📝</div>
                <h3>Passé Composé</h3>
                <p>Verbos irregulares</p>
            </a>
            
            <a href="animais.html" class="quiz-card">
                <div class="quiz-icon">🐾</div>
                <h3>Animais</h3>
                <p>Vocabulário</p>
            </a>
            
            <a href="partes-do-corpo.html" class="quiz-card">
                <div class="quiz-icon">👤</div>
                <h3>Partes do Corpo</h3>
                <p>Vocabulário</p>
            </a>
        </div>
        
        <p style="text-align: center; color: #999; font-size: 0.9rem;">
            <strong>Dica:</strong> Fique atento aos artigos (le/la/les) e acentos!
        </p>
    </div>
</body>
</html>
